<!DOCTYPE html>
<html>
<head>
  <base href="/KhaledElTambouly/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bond Dental Clinic - Responsive Web Interface">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KhaledElTambouly">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bond Dental Clinic</title>
  <link rel="manifest" href="manifest.json">

  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isMessenger = (ua.indexOf("Messenger") > -1 || ua.indexOf("FBAN") > -1 || ua.indexOf("FBAV") > -1);

      if (isMessenger) {
        // ANDROID: Force open in Chrome using an Intent
        if (ua.indexOf("Android") > -1) {
          var currentUrl = window.location.href;
          // Clean the URL to remove the protocol for the intent string
          var cleanUrl = currentUrl.replace(/^https?:\/\//, "");
          window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
        } 
        // iOS: We cannot force Safari, so we show an alert or custom UI
        else if (ua.indexOf("iPhone") > -1 || ua.indexOf("iPad") > -1 || ua.indexOf("iPod") > -1) {
          // Optional: You could inject a CSS banner here instead of an alert
          console.log("iOS Messenger detected. User must manually open in Safari.");
        }
      }
    })();
  </script>

  <style>
    /* Optional: Style for an iOS 'Open in Browser' banner */
    #ios-messenger-notice {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #0078FF;
      color: white;
      text-align: center;
      padding: 12px;
      z-index: 9999;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="ios-messenger-notice">
    For the best experience, tap <b>...</b> and select <b>Open in Safari</b>.
  </div>

  <script>
    // Show the banner only if on iOS Messenger
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    if ((ua.indexOf("Messenger") > -1 || ua.indexOf("FBAN") > -1) && /iPad|iPhone|iPod/.test(ua)) {
      document.getElementById('ios-messenger-notice').style.display = 'block';
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
